<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none; }
        .active-tab { background-color: #4F46E5 !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans">




        <!-- Login Page 01 -->

        
    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-100">
            <div class="text-center mb-6">
                <i class="fab fa-github text-6xl mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h2>
                <p class="text-gray-500">Sign in to manage your issues</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-semibold hover:bg-indigo-700 transition">Sign In</button>
            </form>
            <div class="mt-6 p-4 bg-gray-50 rounded text-center border border-dashed border-gray-300">
                <p class="text-sm text-gray-600">Demo Credentials:</p>
                <p class="font-bold text-gray-800">Username: admin</p>
                <p class="font-bold text-gray-800">Password: admin123</p>
            </div>
        </div>
    </div>
