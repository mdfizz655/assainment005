<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none; }
        .active-tab { background-color: #4F46E5 !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans">




        <!-- Login Page 01 -->


    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-100">
            <div class="text-center mb-6">
                <i class="fab fa-github text-6xl mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h2>
                <p class="text-gray-500">Sign in to manage your issues</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-semibold hover:bg-indigo-700 transition">Sign In</button>
            </form>
            <div class="mt-6 p-4 bg-gray-50 rounded text-center border border-dashed border-gray-300">
                <p class="text-sm text-gray-600">Demo Credentials:</p>
                <p class="font-bold text-gray-800">Username: admin</p>
                <p class="font-bold text-gray-800">Password: admin123</p>
            </div>
        </div>
    </div>



    <!-- Main Content 02 -->
    <div id="main-content" class="hidden">



        <!-- Navbar 03 -->
        <nav class="bg-white border-b border-gray-200 py-4 px-6 flex flex-wrap justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <i class="fab fa-github text-3xl"></i>
                <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex items-center gap-4 mt-4 sm:mt-0">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="Search issues..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none w-64">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    <i class="fas fa-plus"></i> New Issue
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6">





             <!-- Tab Section 04 -->


            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6">
                <div class="flex gap-2 border-b border-gray-100 pb-4">
                    <button onclick="filterIssues('all')" id="btn-all" class="px-6 py-2 rounded-lg bg-gray-100 font-medium active-tab">All</button>
                    <button onclick="filterIssues('open')" id="btn-open" class="px-6 py-2 rounded-lg bg-gray-100 font-medium">Open</button>
                    <button onclick="filterIssues('closed')" id="btn-closed" class="px-6 py-2 rounded-lg bg-gray-100 font-medium">Closed</button>
                </div>


                <div class="flex justify-between items-center mt-4">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-indigo-100 rounded-full text-indigo-600">
                            <i class="fas fa-circle-dot"></i>
                        </div>
                        <div>
                            <h3 id="issue-count" class="text-xl font-bold">0 Issues</h3>
                            <p class="text-sm text-gray-500">Track and manage your project issues</p>
                        </div>

                    </div>

                    <div class="flex gap-4 text-sm font-medium">
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</span>
                    </div>
                </div>
            </div>
